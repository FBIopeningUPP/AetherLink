<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherLink BMS Dashboard</title>
    <!-- Tailwind CSS for layout and styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center bg-slate-900 text-slate-50 selection:bg-blue-500 selection:text-white">

    <div class="w-full max-w-4xl space-y-6">
        
        <!-- Header & Connection Controls -->
        <header class="flex flex-col md:flex-row items-center justify-between bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
            <div class="flex items-center gap-4 mb-4 md:mb-0">
                <div class="bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-500/20">
                    <i data-lucide="radio" class="w-8 h-8 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">AetherLink Telemetry</h1>
                    <p id="connection-status" class="text-sm text-slate-400 flex items-center gap-2 mt-1">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse" id="status-dot"></span>
                        <span id="status-text">Disconnected</span>
                    </p>
                </div>
            </div>
            <button id="connect-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-blue-500/20 flex items-center gap-2">
                <i data-lucide="bluetooth" class="w-5 h-5"></i>
                <span id="connect-btn-text">Connect to Drone</span>
            </button>
        </header>

        <!-- Main Metrics Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <!-- Pack Voltage -->
            <div class="bg-slate-800 p-4 md:p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-xs md:text-sm font-semibold mb-2">Pack Voltage</p>
                <div class="flex items-baseline gap-1">
                    <span id="pack-voltage" class="text-3xl md:text-4xl font-bold data-font">0.00</span>
                    <span class="text-lg text-slate-400">V</span>
                </div>
            </div>

            <!-- State of Charge -->
            <div class="bg-slate-800 p-4 md:p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-xs md:text-sm font-semibold mb-2">State of Charge</p>
                <div class="flex items-baseline gap-1">
                    <span id="soc" class="text-3xl md:text-4xl font-bold data-font text-emerald-400">0</span>
                    <span class="text-lg text-emerald-400/70">%</span>
                </div>
            </div>

            <!-- Pack Status -->
            <div class="bg-slate-800 p-4 md:p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-xs md:text-sm font-semibold mb-2">Status</p>
                <div class="flex items-center gap-2 mt-1">
                    <i data-lucide="power-off" id="status-icon" class="w-5 h-5 md:w-6 md:h-6 text-slate-500"></i>
                    <span id="pack-status" class="text-lg md:text-xl font-bold data-font text-slate-400">IDLE</span>
                </div>
            </div>

            <!-- Battery Health -->
            <div class="bg-slate-800 p-4 md:p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-xs md:text-sm font-semibold mb-2">Health (SoH)</p>
                <div class="flex items-baseline gap-1">
                    <span id="battery-health" class="text-3xl md:text-4xl font-bold data-font text-blue-400">100</span>
                    <span class="text-lg text-blue-400/70">%</span>
                </div>
            </div>

            <!-- Cell Imbalance -->
            <div class="bg-slate-800 p-4 md:p-6 rounded-2xl shadow-lg border border-slate-700 flex flex-col justify-center items-center col-span-2 md:col-span-1 relative overflow-hidden">
                <p class="text-slate-400 text-xs md:text-sm font-semibold mb-2 relative z-10">Cell Delta</p>
                <div class="flex items-baseline gap-1 relative z-10">
                    <span id="cell-delta" class="text-3xl font-bold data-font text-white">0</span>
                    <span class="text-lg text-slate-400">mV</span>
                </div>
            </div>

            <!-- Cycles -->
            <div class="bg-slate-800 p-4 md:p-5 rounded-2xl shadow-lg border border-slate-700 flex flex-row justify-around items-center col-span-2 md:col-span-3">
                 <div class="flex flex-col items-center">
                     <p class="text-slate-400 text-[10px] md:text-xs font-semibold mb-1 uppercase tracking-wider">Charge Cycles</p>
                     <span id="charge-cycles" class="text-2xl font-bold data-font text-slate-200">0</span>
                 </div>
                 <div class="w-px h-10 bg-slate-700"></div>
                 <div class="flex flex-col items-center">
                     <p class="text-slate-400 text-[10px] md:text-xs font-semibold mb-1 uppercase tracking-wider">Discharge Cycles</p>
                     <span id="discharge-cycles" class="text-2xl font-bold data-font text-slate-200">0</span>
                 </div>
            </div>
        </div>

        <!-- 12S Cell Grid -->
        <div class="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
            <h2 class="text-lg font-semibold text-slate-300 mb-6 flex items-center gap-2">
                <i data-lucide="battery-medium" class="w-5 h-5"></i>
                Individual Cell Voltages
            </h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="cell-grid">
                <!-- Javascript will inject 12 cells here automatically on load -->
            </div>
        </div>

    </div>

    <!-- UI Setup Script (Runs immediately to draw the grid and icons) -->
    <script>
        lucide.createIcons();

        const cellGridEl = document.getElementById('cell-grid');
        for (let i = 1; i <= 12; i++) {
            cellGridEl.innerHTML += `
                <div class="bg-slate-900 rounded-xl p-4 border border-slate-700/50 flex flex-col items-center">
                    <span class="text-xs text-slate-500 font-bold tracking-wider uppercase mb-1">Cell ${i}</span>
                    <span id="cell-${i}" class="text-xl font-bold data-font text-slate-200">0.000 V</span>
                </div>
            `;
        }
    </script>

    <!-- Modular Application Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
